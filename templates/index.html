<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orbit HR — Command Center</title>
    
    <!-- External Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        /* ==========================================================================
           ORBIT HR — DESIGN TOKENS
           ========================================================================== */
        @import url('https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap');

        :root {
            --bg: #F5F6FB;
            --surface: #FFFFFF;
            --surface-alt: #F9FAFE;
            --border: #E6E8F2;
            --text: #171A2B;
            --text-dim: #6B7080;
            --text-faint: #A0A4B8;
            --sidebar-bg: #12142A;
            --sidebar-bg-2: #191C39;
            --sidebar-text: #C7C9E0;
            --sidebar-text-active: #FFFFFF;
            --primary: #5B5FEF;
            --primary-dark: #4548C9;
            --primary-light: #EDEDFC;
            --success: #10B981;
            --warning: #F59E0B;
            --danger: #F43F5E;
            --radius-sm: 8px;
            --radius-md: 14px;
            --radius-lg: 20px;
            --shadow-sm: 0 1px 2px rgba(23, 26, 43, 0.04);
            --shadow-md: 0 4px 16px rgba(23, 26, 43, 0.06);
            --font-display: 'Sora', sans-serif;
            --font-body: 'Inter', sans-serif;
            --font-mono: 'JetBrains Mono', monospace;

            /* Category Colors */
            --c-employees-bg:#EAF1FF; --c-employees: #3E7BFA;
            --c-departments-bg:#F1ECFE; --c-departments: #8B5CF6;
            --c-positions-bg:#FFF4E0; --c-positions: #F59E0B;
            --c-attendance-bg:#E4F9F0; --c-attendance: #10B981;
            --c-leaves-bg: #FEE9EC; --c-leaves: #F43F5E;
            --c-payroll-bg: #E1F8FC; --c-payroll: #06B6D4;
        }

        * { box-sizing: border-box; }
        body { font-family: var(--font-body); background: var(--bg); color: var(--text); margin: 0; -webkit-font-smoothing: antialiased; }
        h1, h2, h3 { font-family: var(--font-display); margin: 0; }
        
        /* Layout */
        .app-shell { display: flex; min-height: 100vh; }
        .sidebar { width: 260px; background: linear-gradient(190deg, var(--sidebar-bg) 0%, var(--sidebar-bg-2) 100%); color: var(--sidebar-text); padding: 24px 16px; position: sticky; top: 0; height: 100vh; display: flex; flex-direction: column; }
        .brand { display: flex; align-items: center; gap: 12px; padding: 4px 8px 28px; }
        .brand-mark { width: 40px; height: 40px; border-radius: 12px; background: linear-gradient(135deg, var(--primary), #8B8FFF); display: flex; align-items: center; justify-content: center; }
        .brand-name { font-weight: 800; font-size: 18px; color: #fff; font-family: var(--font-display); }
        .nav { display: flex; flex-direction: column; gap: 4px; flex: 1; }
        .nav-item { display: flex; align-items: center; gap: 12px; padding: 11px 14px; border-radius: var(--radius-sm); font-size: 14px; font-weight: 500; cursor: pointer; color: var(--sidebar-text); text-decoration: none; transition: 0.2s; }
        .nav-item:hover { background: rgba(255,255,255,0.06); color: #fff; }
        .nav-item.active { background: rgba(91,95,239,0.22); color: #fff; }
        .main-col { flex: 1; display: flex; flex-direction: column; min-width: 0; }
        .topbar { padding: 26px 36px 18px; display: flex; justify-content: space-between; align-items: center; }
        .content { padding: 8px 36px 40px; flex: 1; }
        .page { display: none; }
        .page.active { display: block; }

        /* UI Components */
        .btn { display: inline-flex; align-items: center; gap: 8px; border: none; border-radius: var(--radius-sm); font-size: 13.5px; font-weight: 600; padding: 10px 16px; cursor: pointer; }
        .btn-primary { background: var(--primary); color: #fff; }
        .btn-secondary { background: var(--surface); border: 1px solid var(--border); color: var(--text); }
        .stat-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 18px; margin-bottom: 22px; }
        .stat-card { background: var(--surface); padding: 20px; border-radius: var(--radius-lg); border: 1px solid var(--border); }
        .icon-badge { width: 44px; height: 44px; border-radius: 12px; display: flex; align-items: center; justify-content: center; margin-bottom: 12px; }
        .stat-value { font-size: 24px; font-weight: 800; font-family: var(--font-display); }
        .stat-label { font-size: 12px; color: var(--text-dim); }
        
        .chart-grid { display: grid; grid-template-columns: 1.4fr 1fr; gap: 18px; margin-bottom: 18px; }
        .panel { background: var(--surface); border-radius: var(--radius-lg); padding: 22px; border: 1px solid var(--border); }
        .chart-wrap { height: 260px; position: relative; }
        
        /* Tables */
        .data-card { background: var(--surface); border-radius: var(--radius-lg); border: 1px solid var(--border); overflow: hidden; }
        .data-table { width: 100%; border-collapse: collapse; }
        .data-table th { background: var(--surface-alt); text-align: left; padding: 12px 20px; font-size: 11px; text-transform: uppercase; color: var(--text-faint); }
        .data-table td { padding: 14px 20px; border-bottom: 1px solid var(--border); font-size: 13.5px; }
        
        /* Status Pills */
        .pill { padding: 4px 10px; border-radius: 99px; font-size: 11px; font-weight: 700; text-transform: capitalize; }
        .pill-active, .pill-present { background: #E4F9F0; color: #0F9D6D; }
        .pill-inactive, .pill-pending { background: #FFF4E0; color: #B8790C; }
        .pill-terminated, .pill-absent { background: #FEE9EC; color: #E11D48; }

        /* Modals */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: none; align-items: center; justify-content: center; z-index: 1000; }
        .modal-overlay.show { display: flex; }
        .modal { background: #fff; padding: 24px; border-radius: var(--radius-lg); width: 500px; max-width: 90%; }
        .form-group { margin-bottom: 16px; display: flex; flex-direction: column; gap: 6px; }
        .form-group label { font-size: 12px; font-weight: 600; color: var(--text-dim); }
        .form-group input, .form-group select { padding: 10px; border: 1px solid var(--border); border-radius: 6px; }

        /* Toast */
        .toast-root { position: fixed; top: 20px; right: 20px; z-index: 2000; }
        .toast { background: #333; color: #fff; padding: 12px 20px; border-radius: 8px; margin-bottom: 10px; animation: slideIn 0.3s; }
        @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }
    </style>
</head>
<body>

<div class="app-shell">
    <aside class="sidebar">
        <div class="brand">
            <div class="brand-mark"><i data-lucide="orbit" style="color:#fff"></i></div>
            <span class="brand-name">Orbit HR</span>
        </div>
        <nav class="nav">
            <a href="#dashboard" class="nav-item active" onclick="navigate('dashboard')"><i data-lucide="layout-dashboard"></i>Dashboard</a>
            <a href="#employees" class="nav-item" onclick="navigate('employees')"><i data-lucide="users"></i>Employees</a>
            <a href="#departments" class="nav-item" onclick="navigate('departments')"><i data-lucide="building-2"></i>Departments</a>
            <a href="#attendance" class="nav-item" onclick="navigate('attendance')"><i data-lucide="calendar-check"></i>Attendance</a>
            <a href="#payroll" class="nav-item" onclick="navigate('payroll')"><i data-lucide="wallet"></i>Payroll</a>
        </nav>
        <div id="dbStatusPill" style="font-size: 11px; color: var(--text-faint); margin-top: 20px;">Checking status...</div>
    </aside>

    <div class="main-col">
        <header class="topbar">
            <div>
                <h1 id="pageTitle">Dashboard</h1>
                <p id="pageSubtitle" style="color: var(--text-dim); font-size: 13px; margin: 4px 0 0;">Organization Overview</p>
            </div>
            <div id="topbarActions"></div>
        </header>

        <main class="content">
            <!-- Dashboard Page -->
            <section id="page-dashboard" class="page active">
                <div class="stat-grid" id="statGrid"></div>
                <div class="chart-grid">
                    <div class="panel">
                        <h3>Hiring Trend</h3>
                        <div class="chart-wrap"><canvas id="hiringChart"></canvas></div>
                    </div>
                    <div class="panel">
                        <h3>Department Mix</h3>
                        <div class="chart-wrap"><canvas id="deptPieChart"></canvas></div>
                        <div id="deptLegend" style="margin-top: 15px; display: flex; flex-wrap: wrap; gap: 10px;"></div>
                    </div>
                </div>
                <div class="chart-grid">
                    <div class="panel">
                        <h3>Attendance Trend</h3>
                        <div class="chart-wrap"><canvas id="attendanceChart"></canvas></div>
                    </div>
                    <div class="panel">
                        <h3>Status Breakdown</h3>
                        <div class="chart-wrap"><canvas id="statusPieChart"></canvas></div>
                        <div id="statusLegend" style="margin-top: 15px; display: flex; flex-wrap: wrap; gap: 10px;"></div>
                    </div>
                </div>
            </section>

            <!-- Employees Page -->
            <section id="page-employees" class="page">
                <div class="data-card">
                    <table class="data-table">
                        <thead>
                            <tr><th>Name</th><th>Code</th><th>Dept</th><th>Status</th><th>Salary</th><th>Actions</th></tr>
                        </thead>
                        <tbody id="employeeTableBody"></tbody>
                    </table>
                </div>
            </section>

            <!-- Other pages... (simplified for rewrite, logic remains) -->
            <section id="page-departments" class="page">
                <div class="data-card">
                    <table class="data-table">
                        <thead><tr><th>Name</th><th>Location</th><th>Actions</th></tr></thead>
                        <tbody id="deptTableBody"></tbody>
                    </table>
                </div>
            </section>
            
            <section id="page-attendance" class="page">
                <div class="data-card">
                    <table class="data-table">
                        <thead><tr><th>Employee</th><th>Date</th><th>Status</th></tr></thead>
                        <tbody id="attTableBody"></tbody>
                    </table>
                </div>
            </section>

            <section id="page-payroll" class="page">
                <div class="data-card">
                    <table class="data-table">
                        <thead><tr><th>Employee</th><th>Period</th><th>Net Pay</th><th>Status</th></tr></thead>
                        <tbody id="payrollTableBody"></tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>
</div>

<!-- Modal Overlays -->
<div class="modal-overlay" id="employeeModal">
    <div class="modal">
        <h3 id="empModalTitle">Add Employee</h3>
        <form id="empForm" style="margin-top: 15px;">
            <input type="hidden" id="empId">
            <div class="form-group"><label>Employee Code</label><input type="text" id="empCode" required></div>
            <div class="form-group"><label>First Name</label><input type="text" id="empFirst" required></div>
            <div class="form-group"><label>Last Name</label><input type="text" id="empLast" required></div>
            <div class="form-group"><label>Email</label><input type="email" id="empEmail" required></div>
            <div class="form-group"><label>Salary</label><input type="number" id="empSalary" required></div>
            <div style="display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px;">
                <button type="button" class="btn btn-secondary" onclick="closeModal('employeeModal')">Cancel</button>
                <button type="submit" class="btn btn-primary">Save</button>
            </div>
        </form>
    </div>
</div>

<div id="toastRoot" class="toast-root"></div>

<script>
/* ==========================================================================
   ORBIT HR — UTILITIES
   ========================================================================== */
const Api = {
    async request(method, url, body) {
        const opts = { method, headers: { "Content-Type": "application/json" } };
        if (body) opts.body = JSON.stringify(body);
        const res = await fetch(url, opts);
        const json = await res.json();
        if (!res.ok) throw new Error(json.message || "API Error");
        return json.data;
    },
    get(url) { return this.request("GET", url); },
    post(url, body) { return this.request("POST", url, body); },
    put(url, body) { return this.request("PUT", url, body); },
    del(url) { return this.request("DELETE", url); }
};

function showToast(msg, type = "info") {
    const root = document.getElementById("toastRoot");
    const el = document.createElement("div");
    el.className = "toast";
    el.style.background = type === "error" ? "#E11D48" : "#10B981";
    el.textContent = msg;
    root.appendChild(el);
    setTimeout(() => el.remove(), 3000);
}

function formatCurrency(v) { return "$" + Number(v || 0).toLocaleString(); }
function formatDate(d) { return d ? new Date(d).toLocaleDateString() : '—'; }
function escapeHtml(s) { return String(s).replace(/&/g, "&amp;").replace(/</g, "&lt;"); }
function closeModal(id) { document.getElementById(id).classList.remove('show'); }
function openModal(id) { document.getElementById(id).classList.add('show'); }

/* ==========================================================================
   ORBIT HR — DASHBOARD & CHARTS
   ========================================================================== */
let charts = {};
const COLORS = ["#5B5FEF", "#3E7BFA", "#8B5CF6", "#F59E0B", "#10B981", "#F43F5E", "#06B6D4"];

function setupChartDefaults() {
    if (typeof Chart !== 'undefined') {
        Chart.defaults.font.family = "'Inter', sans-serif";
        Chart.defaults.color = "#6B7080";
        Chart.defaults.plugins.legend.display = false;
    }
}

function renderHiringChart(trend) {
    if (typeof Chart === 'undefined') return;
    const ctx = document.getElementById("hiringChart").getContext('2d');
    if (charts.hiring) charts.hiring.destroy();
    charts.hiring = new Chart(ctx, {
        type: 'line',
        data: {
            labels: trend.map(t => t.label),
            datasets: [{ data: trend.map(t => t.value), borderColor: "#5B5FEF", tension: 0.4, fill: true, backgroundColor: "rgba(91,95,239,0.05)" }]
        },
        options: { responsive: true, maintainAspectRatio: false }
    });
}

function renderDeptPie(dist) {
    if (typeof Chart === 'undefined') return;
    const ctx = document.getElementById("deptPieChart").getContext('2d');
    if (charts.dept) charts.dept.destroy();
    charts.dept = new Chart(ctx, {
        type: 'doughnut',
        data: {
            labels: dist.map(d => d.label),
            datasets: [{ data: dist.map(d => d.value), backgroundColor: COLORS }]
        },
        options: { responsive: true, maintainAspectRatio: false, cutout: '70%' }
    });
    document.getElementById("deptLegend").innerHTML = dist.map((d, i) => `
        <div style="font-size:11px; display:flex; align-items:center; gap:5px;">
            <div style="width:8px; height:8px; border-radius:50%; background:${COLORS[i % COLORS.length]}"></div>
            ${d.label}: ${d.value}
        </div>
    `).join("");
}

function renderStatusPie(dist) {
    if (typeof Chart === 'undefined') return;
    const ctx = document.getElementById("statusPieChart").getContext('2d');
    const colorMap = { active: "#10B981", inactive: "#F59E0B", terminated: "#F43F5E", on_leave: "#3E7BFA" };
    if (charts.status) charts.status.destroy();
    charts.status = new Chart(ctx, {
        type: 'doughnut',
        data: {
            labels: dist.map(d => d.label),
            datasets: [{ data: dist.map(d => d.value), backgroundColor: dist.map(d => colorMap[d.label] || "#ccc") }]
        },
        options: { responsive: true, maintainAspectRatio: false, cutout: '70%' }
    });
}

function renderAttendanceChart(trend) {
    if (typeof Chart === 'undefined') return;
    const ctx = document.getElementById("attendanceChart").getContext('2d');
    if (charts.att) charts.att.destroy();
    charts.att = new Chart(ctx, {
        type: 'line',
        data: {
            labels: trend.map(t => formatDate(t.label)),
            datasets: [
                { label: 'Present', data: trend.map(t => t.present), borderColor: "#10B981", tension: 0.4 },
                { label: 'Absent', data: trend.map(t => t.absent), borderColor: "#F43F5E", tension: 0.4 }
            ]
        },
        options: { responsive: true, maintainAspectRatio: false }
    });
}

async function loadDashboard() {
    setupChartDefaults();
    try {
        const data = await Api.get("/api/dashboard/stats");
        
        // Render Cards
        const grid = document.getElementById("statGrid");
        const cards = [
            { l: "Employees", v: data.cards.total_employees, i: "users", b: "badge-employees" },
            { l: "Present Today", v: data.cards.present_today, i: "calendar-check", b: "badge-attendance" },
            { l: "Active Payroll", v: formatCurrency(data.cards.total_monthly_salary), i: "wallet", b: "badge-payroll" },
            { l: "Departments", v: data.cards.total_departments, i: "building-2", b: "badge-departments" },
            { l: "Pending Leave", v: data.cards.pending_leaves, i: "plane-takeoff", b: "badge-leaves" }
        ];
        grid.innerHTML = cards.map(c => `
            <div class="stat-card">
                <div class="icon-badge ${c.b}"><i data-lucide="${c.i}"></i></div>
                <div class="stat-value">${c.v}</div>
                <div class="stat-label">${c.l}</div>
            </div>
        `).join("");
        
        lucide.createIcons();
        renderHiringChart(data.hiring_trend);
        renderDeptPie(data.department_distribution);
        renderStatusPie(data.status_distribution);
        renderAttendanceChart(data.attendance_trend);
    } catch (e) {
        showToast(e.message, "error");
    }
}

/* ==========================================================================
   ORBIT HR — EMPLOYEES
   ========================================================================== */
async function loadEmployees() {
    const body = document.getElementById("employeeTableBody");
    body.innerHTML = "<tr><td colspan='6'>Loading...</td></tr>";
    try {
        const data = await Api.get("/api/employees");
        body.innerHTML = data.map(e => `
            <tr>
                <td><strong>${e.first_name} ${e.last_name}</strong></td>
                <td><code>${e.employee_code}</code></td>
                <td>${e.department ? e.department.name : '—'}</td>
                <td><span class="pill pill-${e.status}">${e.status}</span></td>
                <td>${formatCurrency(e.salary)}</td>
                <td><button onclick="deleteEmployee(${e.id})" style="color:red; border:none; background:none; cursor:pointer;">Delete</button></td>
            </tr>
        `).join("");
    } catch (e) { showToast(e.message, "error"); }
}

async function deleteEmployee(id) {
    if (!confirm("Delete employee?")) return;
    try {
        await Api.del(`/api/employees/${id}`);
        showToast("Employee removed");
        loadEmployees();
    } catch (e) { showToast(e.message, "error"); }
}

/* ==========================================================================
   ORBIT HR — ROUTING
   ========================================================================== */
const PAGES = {
    dashboard: { title: "Dashboard", sub: "Live Org Overview", load: loadDashboard },
    employees: { title: "Employees", sub: "Manage Workforce", load: loadEmployees, action: `<button class="btn btn-primary" onclick="openModal('employeeModal')">Add Employee</button>` },
    departments: { title: "Departments", sub: "Units & Groups", load: () => {} },
    attendance: { title: "Attendance", sub: "Daily Records", load: () => {} },
    payroll: { title: "Payroll", sub: "Financial Records", load: () => {} }
};

function navigate(pageId) {
    const config = PAGES[pageId] || PAGES.dashboard;
    
    // UI Updates
    document.querySelectorAll(".page").forEach(p => p.classList.remove('active'));
    document.getElementById(`page-${pageId}`).classList.add('active');
    document.querySelectorAll(".nav-item").forEach(n => n.classList.remove('active'));
    document.querySelector(`[href="#${pageId}"]`).classList.add('active');
    
    document.getElementById("pageTitle").textContent = config.title;
    document.getElementById("pageSubtitle").textContent = config.sub;
    document.getElementById("topbarActions").innerHTML = config.action || "";
    
    config.load();
    lucide.createIcons();
}

/* ==========================================================================
   INITIALIZATION
   ========================================================================== */
document.addEventListener("DOMContentLoaded", () => {
    lucide.createIcons();
    
    // Check Health
    Api.get("/healthz").then(d => {
        const p = document.getElementById("dbStatusPill");
        p.textContent = d.supabase_configured ? "● Database Connected" : "○ Database Offline";
        p.style.color = d.supabase_configured ? "#10B981" : "#F43F5E";
    });

    // Form Handling
    document.getElementById("empForm").onsubmit = async (e) => {
        e.preventDefault();
        const payload = {
            employee_code: document.getElementById("empCode").value,
            first_name: document.getElementById("empFirst").value,
            last_name: document.getElementById("empLast").value,
            email: document.getElementById("empEmail").value,
            salary: document.getElementById("empSalary").value,
            hire_date: new Date().toISOString().split('T')[0]
        };
        try {
            await Api.post("/api/employees", payload);
            showToast("Employee added!");
            closeModal('employeeModal');
            loadEmployees();
        } catch (err) { showToast(err.message, "error"); }
    };

    // Default Page
    navigate('dashboard');
});
</script>

</body>
</html>
